<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MuJoCo Live</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #1a1a2e;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas
      id="canvas"
      oncontextmenu="event.preventDefault()"
    ></canvas>
    <script>
      var Module = {
        canvas: (() => {
          const canvas = document.getElementById("canvas");
          return canvas;
        })(),
        locateFile: function(path, prefix) {
          if (path.endsWith('.data')) {
            return 'web_client.data';
          }
          if (path.includes('assets/')) {
            const filename = path.substring(path.lastIndexOf('/') + 1);
            return 'assets/' + filename;
          }
          return prefix + path;
        }
      };
      // Only set the CSS size of the canvas; SDL's Emscripten backend detects
      // external CSS resizes and manages the backing store itself (CSS size
      // times devicePixelRatio). Writing canvas.width/height here would fight
      // SDL and desynchronize ImGui layout, rendering, and mouse coordinates.
      window.addEventListener("resize", function () {
        Module.canvas.style.width = window.innerWidth + "px";
        Module.canvas.style.height = window.innerHeight + "px";
      });
      // Diagnostic hook: ?autosweep=1 sweeps synthetic mouse moves across
      // the canvas, so hover-triggered failures reproduce in a headless
      // browser with no human input.
      if (new URLSearchParams(location.search).has("autosweep")) {
        setTimeout(() => {
          const c = document.getElementById("canvas");
          let i = 0;
          const t = setInterval(() => {
            i++;
            const cols = Math.max(1, Math.floor(window.innerWidth / 15));
            const x = 10 + (i % cols) * 15;
            const y = 10 + Math.floor(i / cols) * 15;
            c.dispatchEvent(new MouseEvent("mousemove", {
              clientX: x, clientY: y, bubbles: true, cancelable: true,
              view: window,
            }));
            if (y > window.innerHeight || i > 5000) clearInterval(t);
          }, 3);
        }, 4000);
      }
    </script>
    <script async src="web_client.js"></script>
  </body>
</html>
