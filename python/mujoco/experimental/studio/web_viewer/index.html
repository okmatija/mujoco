<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MuJoCo Live</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #1a1a2e;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas
      id="canvas"
      oncontextmenu="event.preventDefault()"
    ></canvas>
    <script>
      var Module = {
        canvas: (() => {
          const canvas = document.getElementById("canvas");
          return canvas;
        })(),
        locateFile: function(path, prefix) {
          if (path.endsWith('.data')) {
            return 'web_client.data';
          }
          if (path.includes('assets/')) {
            const filename = path.substring(path.lastIndexOf('/') + 1);
            return 'assets/' + filename;
          }
          return prefix + path;
        }
      };
      // Only set the CSS size of the canvas; SDL's Emscripten backend detects
      // external CSS resizes and manages the backing store itself (CSS size
      // times devicePixelRatio). Writing canvas.width/height here would fight
      // SDL and desynchronize ImGui layout, rendering, and mouse coordinates.
      // Always use whole CSS pixels: the 100vw/100vh stylesheet size can be
      // fractional under display scaling, and SDL polls the CSS size every
      // frame — an unstably-rounded size makes the streamed UI relayout each
      // frame (visible as toolbar/text flicker).
      function fitCanvas() {
        Module.canvas.style.width = Math.floor(window.innerWidth) + "px";
        Module.canvas.style.height = Math.floor(window.innerHeight) + "px";
      }
      fitCanvas();
      window.addEventListener("resize", fitCanvas);
    </script>
    <script async src="web_client.js"></script>
  </body>
</html>
