<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MuJoCo Live</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #1a1a2e;
      }
      canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas
      id="canvas"
      oncontextmenu="event.preventDefault()"
    ></canvas>
    <script>
      var Module = {
        canvas: (() => {
          const canvas = document.getElementById("canvas");
          return canvas;
        })(),
        locateFile: function(path, prefix) {
          if (path.endsWith('.data')) {
            return 'web_client.data';
          }
          if (path.includes('assets/')) {
            const filename = path.substring(path.lastIndexOf('/') + 1);
            return 'assets/' + filename;
          }
          return prefix + path;
        }
      };
      // Only set the CSS size of the canvas; SDL's Emscripten backend detects
      // external CSS resizes and manages the backing store itself (CSS size
      // times devicePixelRatio). Writing canvas.width/height here would fight
      // SDL and desynchronize ImGui layout, rendering, and mouse coordinates.
      // Always use whole CSS pixels: the 100vw/100vh stylesheet size can be
      // fractional under display scaling, and SDL polls the CSS size every
      // frame — an unstably-rounded size makes the streamed UI relayout each
      // frame (visible as toolbar/text flicker).
      function fitCanvas() {
        Module.canvas.style.width = Math.floor(window.innerWidth) + "px";
        Module.canvas.style.height = Math.floor(window.innerHeight) + "px";
      }
      fitCanvas();
      window.addEventListener("resize", fitCanvas);
      // Diagnostic hook: ?ubocheck=1 reports which named uniform block is
      // bound with a range smaller than the shader declares (the cause of
      // WebGL "uniform buffer too small" errors, which don't name the block).
      if (new URLSearchParams(location.search).has("ubocheck")) {
        const P = WebGL2RenderingContext.prototype;
        const bound = new Map();  // binding index -> bound size
        const origRange = P.bindBufferRange;
        P.bindBufferRange = function (target, index, buffer, offset, size) {
          if (target === this.UNIFORM_BUFFER) bound.set(index, size);
          return origRange.call(this, target, index, buffer, offset, size);
        };
        const origBase = P.bindBufferBase;
        P.bindBufferBase = function (target, index, buffer) {
          if (target === this.UNIFORM_BUFFER) bound.set(index, Infinity);
          return origBase.call(this, target, index, buffer);
        };
        const reported = new Set();
        const origDraw = P.drawElementsInstanced;
        P.drawElementsInstanced = function (...args) {
          const prog = this.getParameter(this.CURRENT_PROGRAM);
          if (prog) {
            const n = this.getProgramParameter(prog, this.ACTIVE_UNIFORM_BLOCKS);
            for (let i = 0; i < n; i++) {
              const need = this.getActiveUniformBlockParameter(
                  prog, i, this.UNIFORM_BLOCK_DATA_SIZE);
              const binding = this.getActiveUniformBlockParameter(
                  prog, i, this.UNIFORM_BLOCK_BINDING);
              const have = bound.get(binding);
              if (have !== undefined && have < need) {
                const name = this.getActiveUniformBlockName(prog, i);
                const key = `${name}:${have}<${need}`;
                if (!reported.has(key)) {
                  reported.add(key);
                  console.error(`[ubocheck] block '${name}' binding=${binding}` +
                                ` bound=${have} < needed=${need}`);
                }
              }
            }
          }
          return origDraw.apply(this, args);
        };
      }
      // Diagnostic hook: ?flickerprobe=1 measures frame-to-frame pixel churn
      // in the top toolbar strip and logs a summary once per second. Stable
      // idle UI => changed~0; flicker => large changed counts.
      if (new URLSearchParams(location.search).has("flickerprobe")) {
        setTimeout(() => {
          const c = document.getElementById("canvas");
          const gl = c.getContext("webgl2");
          if (!gl) { console.error("[flickerprobe] no webgl2 ctx"); return; }
          const W = Math.min(1400, gl.drawingBufferWidth);
          const H = 80;
          let prev = null, frames = 0, sumChanged = 0, maxChanged = 0;
          let lastReport = performance.now();
          const probe = () => {
            const buf = new Uint8Array(W * H * 4);
            gl.readPixels(0, gl.drawingBufferHeight - H, W, H,
                          gl.RGBA, gl.UNSIGNED_BYTE, buf);
            if (prev) {
              let changed = 0;
              for (let i = 0; i < buf.length; i += 4) {
                if (buf[i] !== prev[i] || buf[i+1] !== prev[i+1] ||
                    buf[i+2] !== prev[i+2]) changed++;
              }
              frames++; sumChanged += changed;
              if (changed > maxChanged) maxChanged = changed;
            }
            prev = buf;
            const now = performance.now();
            if (now - lastReport > 1000 && frames > 0) {
              console.error(`[flickerprobe] frames=${frames} avgChanged=` +
                  `${Math.round(sumChanged / frames)} maxChanged=${maxChanged}` +
                  ` of ${W * H}px`);
              frames = 0; sumChanged = 0; maxChanged = 0; lastReport = now;
            }
            requestAnimationFrame(probe);
          };
          requestAnimationFrame(probe);
          // Dump two consecutive frames of the strip as PNG data URLs so the
          // alternating states can be inspected visually.
          let dumps = 0;
          const dump = () => {
            if (dumps >= 2) return;
            const buf = new Uint8Array(W * H * 4);
            gl.readPixels(0, gl.drawingBufferHeight - H, W, H,
                          gl.RGBA, gl.UNSIGNED_BYTE, buf);
            const t = document.createElement("canvas");
            t.width = W; t.height = H;
            const ctx = t.getContext("2d");
            const img = ctx.createImageData(W, H);
            // readPixels is bottom-up; flip rows.
            for (let y = 0; y < H; y++) {
              img.data.set(buf.subarray((H - 1 - y) * W * 4, (H - y) * W * 4),
                           y * W * 4);
            }
            ctx.putImageData(img, 0, 0);
            console.error(`[flickerdump${dumps}] ` + t.toDataURL("image/png"));
            dumps++;
            requestAnimationFrame(dump);
          };
          setTimeout(() => requestAnimationFrame(dump), 3000);
        }, 6000);
      }
      // Diagnostic hook: ?autosweep=1 sweeps synthetic mouse moves across
      // the canvas, so hover-triggered failures reproduce in a headless
      // browser with no human input.
      if (new URLSearchParams(location.search).has("autosweep")) {
        setTimeout(() => {
          const c = document.getElementById("canvas");
          let i = 0;
          const t = setInterval(() => {
            i++;
            const cols = Math.max(1, Math.floor(window.innerWidth / 15));
            const x = 10 + (i % cols) * 15;
            const y = 10 + Math.floor(i / cols) * 15;
            c.dispatchEvent(new MouseEvent("mousemove", {
              clientX: x, clientY: y, bubbles: true, cancelable: true,
              view: window,
            }));
            if (y > window.innerHeight || i > 5000) clearInterval(t);
          }, 3);
        }, 4000);
      }
    </script>
    <script async src="web_client.js"></script>
  </body>
</html>
